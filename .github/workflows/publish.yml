---
name: Publish

on:
  push:
    branches:
      - main
  # We allow manually dispatching workflow when needed. Most often, this will not be needed.
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish-sdks:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BUILDER_BOT_FOR_LINT_APP_ID }}
          private-key: ${{ secrets.BUILDER_BOT_FOR_LINT_PRIVATE_KEY }}

      - name: Setup
        uses: actions/checkout@v4
        with:
          # need this token to run CI checks on the created PR
          token: ${{ steps.generate-token.outputs.token }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Monorepo install
        uses: ./.github/actions/yarn-nm-install
        with:
          cache-node-modules: true
          cache-install-state: true

      - name: Create Release PR & Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: yarn ci:release
          title: '📦 Publish Mitosis'
          commit: '📦 Publish Mitosis'
        env:
          # need this token to run CI checks on the created PR
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

          # probably don't need both of those, but it works!
          NPM_TOKEN: ${{ secrets.NPM_RELEASE_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_RELEASE_TOKEN }}
